# Rufus async / Celery integration test environment
#
# Uses pre-built images from Docker Hub so no local build is required.
# The rufus-server service automatically runs Alembic migrations on startup.
#
# Usage:
#   cd rufus_test
#   docker compose -f docker-compose.test-async.yml up -d
#
# Override VERSION to test a different image tag:
#   VERSION=0.6.3 docker compose -f docker-compose.test-async.yml up -d

services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: test-rufus-postgres
    environment:
      POSTGRES_DB: rufus_test
      POSTGRES_USER: rufus
      POSTGRES_PASSWORD: rufus_test_secret
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rufus -d rufus_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-net

  # ─────────────────────────────────────────────────────────────────────────
  # Redis (Celery broker + backend)
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: test-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - test-net

  # ─────────────────────────────────────────────────────────────────────────
  # Rufus API Server — runs Alembic migration before starting uvicorn
  # ─────────────────────────────────────────────────────────────────────────
  rufus-server:
    image: ruhfuskdev/rufus-server:${VERSION:-0.7.7}
    container_name: test-rufus-server
    environment:
      DATABASE_URL: postgresql://rufus:rufus_test_secret@postgres:5432/rufus_test
      WORKFLOW_STORAGE: postgres
      WORKFLOW_EXECUTION_BACKEND: celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      RUFUS_ENCRYPTION_KEY: ${RUFUS_ENCRYPTION_KEY:-test-encryption-key-32chars-here!}
      RUFUS_REGISTRATION_KEY: test-registration-key
      LOG_LEVEL: DEBUG
    volumes:
      # Bind-mount patched source files so changes take effect without rebuilding
      - ../src/rufus_server/main.py:/usr/local/lib/python3.11/site-packages/rufus_server/main.py:ro
      - ../src/rufus_server/api_models.py:/usr/local/lib/python3.11/site-packages/rufus_server/api_models.py:ro
      - ../src/rufus_server/webhook_service.py:/usr/local/lib/python3.11/site-packages/rufus_server/webhook_service.py:ro
      - ../src/rufus/implementations/persistence/postgres.py:/usr/local/lib/python3.11/site-packages/rufus/implementations/persistence/postgres.py:ro
    command: >
      sh -c "
        pip install psycopg2-binary -q &&
        touch /usr/local/lib/python3.11/site-packages/rufus_server/main.py
              /usr/local/lib/python3.11/site-packages/rufus_server/api_models.py
              /usr/local/lib/python3.11/site-packages/rufus_server/webhook_service.py
              /usr/local/lib/python3.11/site-packages/rufus/implementations/persistence/postgres.py &&
        cd /usr/local/lib/python3.11/site-packages/rufus &&
        alembic upgrade head &&
        cd /app &&
        uvicorn rufus_server.main:app --host 0.0.0.0 --port 8000
      "
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - test-net

  # ─────────────────────────────────────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────────────────────────────────────
  celery-worker:
    image: ruhfuskdev/rufus-worker:${VERSION:-0.7.7}
    container_name: test-rufus-worker
    environment:
      DATABASE_URL: postgresql://rufus:rufus_test_secret@postgres:5432/rufus_test
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RUFUS_ENCRYPTION_KEY: ${RUFUS_ENCRYPTION_KEY:-test-encryption-key-32chars-here!}
      LOG_LEVEL: DEBUG
      WORKER_ID: rufus-worker-1
    volumes:
      - ../src/rufus/implementations/persistence/postgres.py:/usr/local/lib/python3.11/site-packages/rufus/implementations/persistence/postgres.py:ro
    command: >
      sh -c "
        touch /usr/local/lib/python3.11/site-packages/rufus/implementations/persistence/postgres.py &&
        celery -A rufus.celery_app worker
          --loglevel=${WORKER_LOG_LEVEL:-info}
          --concurrency=${WORKER_CONCURRENCY:-4}
          --pool=${WORKER_POOL:-prefork}
          -Q default,high_priority,low_priority
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Wait for server to complete alembic upgrade head before worker registers
      rufus-server:
        condition: service_healthy
    networks:
      - test-net

  # ─────────────────────────────────────────────────────────────────────────
  # Edge Device Emulator — tests the upload-YAML → push-to-devices flow
  # ─────────────────────────────────────────────────────────────────────────
  rufus-edge-sim:
    image: ruhfuskdev/rufus-edge-dev:${VERSION:-0.7.7}
    container_name: test-edge-device
    environment:
      CLOUD_URL: http://rufus-server:8000
      DEVICE_ID: sim-device-001
      RUFUS_REGISTRATION_KEY: test-registration-key
      RUFUS_ENCRYPTION_KEY: ""
      DB_PATH: /data/edge_sim.db
      TELEMETRY_INTERVAL: "30"
    volumes:
      # Persist DB + API key across container recreations
      - edge-sim-data:/data
      # Bind-mount patched sim script + telemetry step functions
      - ../examples/edge_deployment/edge_device_sim.py:/app/edge_device_sim.py:ro
      - ../examples/edge_deployment/telemetry_steps.py:/app/telemetry_steps.py:ro
    command: >
      sh -c "
        touch /app/edge_device_sim.py /app/telemetry_steps.py &&
        python edge_device_sim.py
      "
    depends_on:
      rufus-server:
        condition: service_healthy
    networks:
      - test-net
    restart: unless-stopped

networks:
  test-net:
    driver: bridge

volumes:
  edge-sim-data:
