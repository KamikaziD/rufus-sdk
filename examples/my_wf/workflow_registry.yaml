# Workflow Registry
#
# This file registers all available workflows with Rufus.
# Each workflow must specify:
# - type: Unique identifier for the workflow
# - description: Human-readable description
# - config_file: Path to the YAML workflow definition
# - initial_state_model: Python path to the state model

workflows:
  - type: "MyWorkflow"
    description: "A simple greeting workflow demonstrating Rufus basics"
    config_file: "my_workflow.yaml"
    initial_state_model: "state_models.GreetingState"
