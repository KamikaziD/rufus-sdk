# config/kyc_workflow.yaml
# KYC (Know Your Customer) Sub-Workflow
# This workflow is launched as a child of LoanApplication workflow

workflow_type: "KYC"
workflow_version: "1.0"
initial_state_model: "state_models.KYCState"

steps:
  # Step 1: Parallel ID Verification and Sanctions Screening
  - name: "Run_KYC_Checks"
    type: "PARALLEL"
    dependencies: []
    automate_next: true
    tasks:
      - name: "Verify_ID"
        function: "kyc.verify_id_agent"
      - name: "Sanctions_Screen"
        function: "kyc.sanctions_screen_agent"

  # Step 2: Generate KYC Report
  - name: "Generate_KYC_Report"
    type: "STANDARD"
    function: "kyc.generate_kyc_report"
    dependencies: ["Run_KYC_Checks"]