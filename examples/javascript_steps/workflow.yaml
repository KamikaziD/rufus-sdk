workflow_type: "OrderWithJavaScript"
description: "E-commerce order processing with JavaScript data transformation"
initial_state_model: "state_models.OrderState"

steps:
  # Python step: Basic validation
  - name: "Validate_Order"
    type: "STANDARD"
    function: "steps.validate_order"
    automate_next: true

  # JavaScript step: Complex pricing calculations
  - name: "Calculate_Pricing"
    type: "JAVASCRIPT"
    js_config:
      script_path: "scripts/calculate-pricing.js"
      timeout_ms: 5000
      memory_limit_mb: 64
    output_key: "pricing"
    automate_next: true

  # TypeScript step: Discount logic with type safety
  - name: "Apply_Discounts"
    type: "JAVASCRIPT"
    js_config:
      script_path: "scripts/apply-discounts.ts"
      typescript: true
      timeout_ms: 3000
    output_key: "final_pricing"
    automate_next: true

  # Inline JavaScript: Quick summary
  - name: "Generate_Summary"
    type: "JAVASCRIPT"
    js_config:
      code: |
        const pricing = state.final_pricing;
        const summary = {
          order_id: context.workflow_id.slice(0, 8),
          items_count: state.items.length,
          subtotal: pricing.subtotal,
          discount_amount: pricing.discount_amount,
          total: pricing.total,
          generated_at: rufus.now()
        };
        rufus.log(`Order summary generated: $${pricing.total}`);
        return { summary };
      timeout_ms: 2000
    automate_next: true

  # Python step: Final processing
  - name: "Process_Order"
    type: "STANDARD"
    function: "steps.process_order"
