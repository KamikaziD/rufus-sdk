[tool.poetry]
name = "rufus"
version = "0.1.0"
description = "A Python-native, SDK-first workflow engine for orchestrating complex business processes and AI pipelines"
authors = ["Rufus Team <team@rufus.dev>"]
readme = "README.md"
homepage = "https://github.com/rufus-ai/rufus"
repository = "https://github.com/rufus-ai/rufus"
documentation = "https://rufus.readthedocs.io"
keywords = ["workflow", "orchestration", "async", "saga", "state-machine", "celery", "fastapi", "ai", "pipeline"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Distributed Computing",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
packages = [
    { include = "rufus", from = "src" },
    { include = "rufus_cli", from = "src" },
    { include = "rufus_server", from = "src" },
]

[tool.poetry.dependencies]
python = "^3.9"
# Core dependencies (required)
pydantic = "^2.0"
PyYAML = "^6.0"
jinja2 = "^3.1.2"
typer = "^0.21"

# Optional dependencies
fastapi = {version = "^0.100", optional = true}
uvicorn = {version = "^0.20", optional = true}
websockets = {version = "^11.0", optional = true}
celery = {version = "^5.2", optional = true}
redis = {version = "^4.5", optional = true}
asyncpg = {version = "^0.27", optional = true}
rich = {version = "^13.0", optional = true}

[tool.poetry.extras]
server = ["fastapi", "uvicorn", "websockets"]
celery = ["celery", "redis"]
postgres = ["asyncpg"]
cli = ["rich"]
all = ["fastapi", "uvicorn", "websockets", "celery", "redis", "asyncpg", "rich"]

[tool.poetry.group.dev.dependencies]
pytest = "^7.0"
pytest-asyncio = "^0.21"
pytest-cov = "^4.0"
flake8 = "^6.0"
black = "^23.0"
mypy = "^1.0"

[tool.poetry.scripts]
rufus = "rufus_cli.main:app"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--cov=src/rufus --cov-report=term-missing --cov-report=html"

[tool.black]
line-length = 100
target-version = ['py39', 'py310', 'py311', 'py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | confucius
  | original_implementation_files
)/
'''

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = [
    "confucius/",
    "original_implementation_files/",
]
