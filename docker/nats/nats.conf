# NATS Server configuration for Rufus Edge
# Used in docker-compose for local development and testing

# JetStream — durable streams for command delivery and workflow events
jetstream {
  store_dir: "/data"
  max_memory_store: 1GB
  max_file_store: 10GB
}

# Monitoring endpoint (accessible at http://nats:8222/jsz)
http_port: 8222

# WebSocket endpoint for dashboard browser clients (nats.ws)
websocket {
  port: 8080
  no_tls: true
}

# Max payload: 8MB (covers large SyncBatch payloads)
max_payload: 8MB

# Logging
debug: false
trace: false
logtime: true
