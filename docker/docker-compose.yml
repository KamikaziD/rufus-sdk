# Ruvon Edge Cloud Platform - Docker Compose
#
# Usage:
#   cd docker
#   docker compose up -d
#
# Environment Variables:
#   - Copy .env.example to .env and customize (optional)
#   - All values have sensible defaults in docker-compose.yml
#   - See .env.example for full configuration options
#
# Services:
#   - ruvon-server: FastAPI control plane (port 8000)
#   - postgres: PostgreSQL database (port 5433)
#
# Access:
#   - API: http://localhost:8000
#   - Docs: http://localhost:8000/docs
#   - Health: http://localhost:8000/health

services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ruvon-postgres
    command: postgres -c max_connections=${POSTGRES_MAX_CONNECTIONS:-1000} -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-512MB} -c max_wal_size=${POSTGRES_MAX_WAL_SIZE:-2GB}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ruvon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ruvon_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-ruvon_cloud}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Removed init-db.sql - using Alembic migrations instead
      # - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ruvon} -d ${POSTGRES_DB:-ruvon_cloud}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ruvon-network

  # ─────────────────────────────────────────────────────────────────────────
  # Ruvon Cloud Control Plane
  # ─────────────────────────────────────────────────────────────────────────
  ruvon-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: ruvon-cloud
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-ruvon}:${POSTGRES_PASSWORD:-ruvon_secret_2024}@postgres:5432/${POSTGRES_DB:-ruvon_cloud}
      WORKFLOW_STORAGE: ${WORKFLOW_STORAGE:-postgres}

      # PostgreSQL Connection Pool (optimized for high-load testing)
      POSTGRES_POOL_MIN_SIZE: ${POSTGRES_POOL_MIN_SIZE:-50}
      POSTGRES_POOL_MAX_SIZE: ${POSTGRES_POOL_MAX_SIZE:-500}
      POSTGRES_POOL_COMMAND_TIMEOUT: ${POSTGRES_POOL_COMMAND_TIMEOUT:-60}
      POSTGRES_POOL_MAX_QUERIES: ${POSTGRES_POOL_MAX_QUERIES:-500000}
      POSTGRES_POOL_MAX_INACTIVE_LIFETIME: ${POSTGRES_POOL_MAX_INACTIVE_LIFETIME:-600}

      # Server settings
      RUVON_REGISTRATION_KEY: ${RUVON_REGISTRATION_KEY:-demo-registration-key-2024}

      # Encryption (CRITICAL: Use same key for all containers to decrypt workflows)
      RUVON_ENCRYPTION_KEY: ${RUVON_ENCRYPTION_KEY:-}

      # Artifacts
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/app/artifacts}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - artifacts_data:/app/artifacts
    ports:
      - "${RUVON_SERVER_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ruvon-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Keycloak — OIDC identity provider for dashboard RBAC
  # ─────────────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ruvon-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ruvon_cloud}
      KC_DB_USERNAME: ${POSTGRES_USER:-ruvon}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-ruvon_secret_2024}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./keycloak/ruvon-realm.json:/opt/keycloak/data/import/ruvon-realm.json:ro
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ruvon-network
    restart: unless-stopped

networks:
  ruvon-network:
    driver: bridge

volumes:
  postgres_data:
  artifacts_data:
