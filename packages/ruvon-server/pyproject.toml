[project]
name = "ruvon-server"
version = "0.1.2"
description = "Ruvon cloud control plane — REST API, device fleet management, Celery workers"
authors = [{name = "Ruvon Team", email = "team@ruvon.dev"}]
license = {text = "Apache-2.0"}
readme = "README.md"
requires-python = ">=3.9"
keywords = ["workflow", "fintech", "api", "server", "celery", "fleet-management"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = ["ruvon-sdk>=0.1.2"]

[project.urls]
Homepage = "https://github.com/KamikaziD/ruvon-server"
Repository = "https://github.com/KamikaziD/ruvon-server"

[project.optional-dependencies]
server = ["fastapi>=0.100", "uvicorn>=0.20", "starlette>=0.27", "slowapi>=0.1"]
celery = ["celery>=5.3", "redis>=5.0", "psycopg2-binary>=2.9", "prometheus-client>=0.19"]
auth = ["python-jose[cryptography]>=3.3"]
nats = ["nats-py>=2.3", "betterproto>=0.9.0", "protobuf>=4.21"]
all = [
    "fastapi>=0.100", "uvicorn>=0.20", "starlette>=0.27", "slowapi>=0.1",
    "celery>=5.3", "redis>=5.0", "psycopg2-binary>=2.9", "prometheus-client>=0.19",
    "python-jose[cryptography]>=3.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ruvon_server"]
