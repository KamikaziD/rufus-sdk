[project]
name = "rufus-sdk-server"
version = "0.7.2"
description = "Rufus cloud control plane — REST API, device fleet management, Celery workers"
authors = [{name = "Rufus Team", email = "team@rufus.dev"}]
license = {text = "MIT"}
readme = "../../README.md"
requires-python = ">=3.9"
keywords = ["workflow", "fintech", "api", "server", "celery", "fleet-management"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = ["rufus-sdk>=0.6.0"]

[project.urls]
Homepage = "https://github.com/KamikaziD/rufus-sdk"
Repository = "https://github.com/KamikaziD/rufus-sdk"

[project.optional-dependencies]
server = ["fastapi>=0.100", "uvicorn>=0.20", "starlette>=0.27", "slowapi>=0.1"]
celery = ["celery>=5.3", "redis>=5.0", "psycopg2-binary>=2.9", "prometheus-client>=0.19"]
auth = ["python-jose[cryptography]>=3.3"]
all = [
    "fastapi>=0.100", "uvicorn>=0.20", "starlette>=0.27", "slowapi>=0.1",
    "celery>=5.3", "redis>=5.0", "psycopg2-binary>=2.9", "prometheus-client>=0.19",
    "python-jose[cryptography]>=3.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel.force-include]
"../../src/rufus_server" = "rufus_server"
