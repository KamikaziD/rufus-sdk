[project]
name = "rufus-sdk-edge"
version = "0.7.9"
description = "Rufus edge agent for offline-first fintech devices (POS, ATM, kiosks)"
authors = [{name = "Rufus Team", email = "team@rufus.dev"}]
license = {text = "MIT"}
readme = "../../README.md"
requires-python = ">=3.9"
keywords = ["workflow", "fintech", "pos", "edge", "offline", "store-and-forward", "payment"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Office/Business :: Financial :: Point-Of-Sale",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = ["rufus-sdk>=0.6.0"]

[project.urls]
Homepage = "https://github.com/KamikaziD/rufus-sdk"
Repository = "https://github.com/KamikaziD/rufus-sdk"

[project.optional-dependencies]
edge = ["websockets>=12.0", "psutil>=5.9", "numpy>=1.24"]
all = ["websockets>=12.0", "psutil>=5.9", "numpy>=1.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel.force-include]
"../../src/rufus_edge" = "rufus_edge"
