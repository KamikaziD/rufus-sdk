[project]
name = "rufus-sdk-edge"
version = "1.0.0rc5"
description = "Rufus edge agent for offline-first fintech devices (POS, ATM, kiosks)"
authors = [{name = "Rufus Team", email = "team@rufus.dev"}]
license = {text = "Apache-2.0"}
readme = "../../README.md"
requires-python = ">=3.9"
keywords = ["workflow", "fintech", "pos", "edge", "offline", "store-and-forward", "payment"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Office/Business :: Financial :: Point-Of-Sale",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = ["rufus-sdk>=1.0.0rc5"]

[project.urls]
Homepage = "https://github.com/KamikaziD/rufus-sdk"
Repository = "https://github.com/KamikaziD/rufus-sdk"

[project.optional-dependencies]
# Full-featured native install (POS terminals, ATMs, dev machines)
edge = ["websockets>=12.0", "psutil>=5.9", "numpy>=1.24", "httpx>=0.27"]
all  = ["websockets>=12.0", "psutil>=5.9", "numpy>=1.24", "httpx>=0.27"]

# Browser / Pyodide — no native extensions; js.fetch replaces httpx
# Install with: pip install 'rufus-sdk-edge[browser]'
browser = []

# WASI 0.3 compiled target — zero extra deps (wasi:http used for HTTP)
# Install with: pip install 'rufus-sdk-edge[wasi]'
wasi = []

# wasmtime Component Model support on native Python
# Install with: pip install 'rufus-sdk-edge[native-wasm]'
native-wasm = ["wasmtime>=20"]

# NATS JetStream transport for edge devices
# Install with: pip install 'rufus-sdk-edge[nats]'
nats = ["nats-py>=2.3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel.force-include]
"../../src/rufus_edge" = "rufus_edge"
