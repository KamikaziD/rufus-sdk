# DeploymentMonitorWasm — Sidecar workflow using WASM-sandboxed ApplyChange
#
# Identical to deployment_monitor.yaml except the ApplyChange step uses
# type: WASM for sandboxed execution.  This variant is used in high-security
# environments where config writes must be isolated from the main process.
#
# Prerequisites:
#   - apply_config.wasm compiled and present at:
#     src/ruvon_edge/sidecar/wasm/apply_config.wasm
#   - Compile with: python -m ruvon_edge.sidecar.build_wasm
#
# The STANDARD variant (deployment_monitor.yaml) is the default and requires
# no binary — use this WASM variant only when sandboxing is required.

workflow_type: DeploymentMonitorWasm
workflow_version: "1.0"
description: "WASM-sandboxed deployment sidecar — same as DeploymentMonitor but ApplyChange runs in WASI isolation"

cron_expression: "*/15 * * * *"
timezone: "UTC"

initial_state_model: ruvon_edge.sidecar.metrics:SidecarState

steps:
  - name: CollectMetrics
    type: STANDARD
    function: ruvon_edge.sidecar.metrics:collect_device_metrics
    description: "Collect CPU, RAM, SAF queue depth, and latency percentiles"
    automate_next: true
    timeout_seconds: 10

  - name: ScoreHealth
    type: STANDARD
    function: ruvon_edge.sidecar.health_scorer:score_health
    description: "Score device health 0.0–1.0 (ONNX or rule-based fallback)"
    automate_next: true
    timeout_seconds: 5

  - name: HealthDecision
    type: DECISION
    function: ruvon_edge.sidecar.decisions:health_gate
    description: "Jump to ReportOutcome if health_score >= 0.7"

  - name: GenerateSuggestions
    type: AI_LLM_INFERENCE
    description: "Generate a targeted config improvement using local LLM"
    llm_config:
      backend: ollama
      model: llama3
      data_sovereignty: local
      max_tokens: 512
      temperature: 0.1
    prompt_template: |
      You are an expert Ruvon edge device operator. Analyse the following
      device metrics and identify the single most impactful config change.

      Device metrics:
      {{ state.metrics | tojson(indent=2) }}

      Current config:
      {{ state.current_config | tojson(indent=2) }}

      Health score: {{ state.health_score }} (threshold: 0.7)

      Return ONLY valid JSON with this exact schema:
      {
        "issue": "<one-sentence description of the performance problem>",
        "change": {"key": "<config key>", "value": <new value>},
        "expected_improvement": "<expected outcome>",
        "risk": "low|medium|high",
        "apply_mode": "hot_swap|drain_restart"
      }
    automate_next: true
    timeout_seconds: 60

  - name: ApprovalGate
    type: HUMAN_IN_LOOP
    description: "Request operator approval before applying any change"
    required_input:
      - name: approved
        type: bool
        description: "Approve the suggested change"
      - name: operator_notes
        type: str
        description: "Optional operator comment"
        required: false
    timeout_hours: 48

  - name: ApprovalDecision
    type: DECISION
    function: ruvon_edge.sidecar.decisions:approval_gate
    description: "Jump to ReportOutcome if operator rejected the suggestion"

  # -------------------------------------------------------------------------
  # WASM-sandboxed ApplyChange — runs apply_config.wasm in WASI isolation
  # Input (stdin):  JSON with change key/value + approved flag
  # Output (stdout): JSON with outcome + method
  # -------------------------------------------------------------------------
  - name: ApplyChange
    type: WASM
    module: sidecar/wasm/apply_config.wasm
    description: "Sandboxed config apply (WASI isolation — no filesystem access outside /tmp)"
    automate_next: true
    timeout_seconds: 30
    # compensate_function not available for WASM steps — rollback handled by host

  - name: ReportOutcome
    type: HTTP
    method: POST
    url: "{{ env('RUVON_CONTROL_PLANE_URL', 'http://localhost:8000') }}/api/v1/devices/{{ env('RUVON_DEVICE_ID', 'unknown') }}/suggestions"
    headers:
      Content-Type: "application/json"
      X-Device-Id: "{{ env('RUVON_DEVICE_ID', 'unknown') }}"
    body: |
      {
        "workflow_id": "{{ state.workflow_id }}",
        "device_id": "{{ env('RUVON_DEVICE_ID', 'unknown') }}",
        "suggestion": {{ state.suggestion | tojson }},
        "health_score_before": {{ state.health_score }},
        "metrics_snapshot": {
          "cpu_percent": {{ state.metrics.cpu_percent }},
          "ram_percent": {{ state.metrics.ram_percent }},
          "pending_saf_count": {{ state.metrics.pending_saf_count }},
          "step_latency_p95_ms": {{ state.metrics.step_latency_p95_ms }}
        },
        "timestamp": "{{ now_iso() }}"
      }
    timeout_seconds: 30
    on_error: continue
