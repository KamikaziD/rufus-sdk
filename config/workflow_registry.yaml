# Rufus Edge Workflow Registry
# Register all available workflows for the fintech edge platform

workflows:
  - type: "ConfigRollout"
    description: "Fleet-wide config push with progressive rollout and saga compensation"
    config_file: "config_rollout_workflow.yaml"
    initial_state_model: "rufus_server.steps.config_rollout_steps.ConfigRolloutState"

  - type: "PolicyRollout"
    description: "Durable policy creation with saga compensation"
    config_file: "policy_rollout_workflow.yaml"
    initial_state_model: "rufus_server.steps.policy_rollout_steps.PolicyRolloutState"

  - type: "PaymentAuthorization"
    description: "Payment authorization with offline fallback"
    config_file: "payment_workflow.yaml"
    initial_state_model: "rufus_edge.models.PaymentState"

  - type: "RefundTransaction"
    description: "Process refunds for completed transactions"
    config_file: "refund_workflow.yaml"
    initial_state_model: "rufus_edge.models.PaymentState"
    # Not yet implemented

  - type: "VoidTransaction"
    description: "Void a pending authorization"
    config_file: "void_workflow.yaml"
    initial_state_model: "rufus_edge.models.PaymentState"
    # Not yet implemented

  - type: "DeploymentMonitor"
    description: "Autonomous deployment sidecar — monitors device health, surfaces HITL improvement proposals, applies approved changes via WASM sandbox"
    config_file: "deployment_monitor.yaml"
    initial_state_model: "rufus_edge.sidecar.metrics:DeviceMetrics"
    requires:
      - rufus-sdk-edge

  - type: "DeploymentMonitorWasm"
    description: "WASM-sandboxed deployment sidecar — same as DeploymentMonitor but ApplyChange runs in WASI isolation (requires compiled apply_config.wasm)"
    config_file: "deployment_monitor_wasm.yaml"
    initial_state_model: "rufus_edge.sidecar.metrics:DeviceMetrics"
    requires:
      - rufus-sdk-edge
