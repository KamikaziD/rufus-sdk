version: '3.8'

services:
  worker-onsite:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A celery_setup worker --loglevel=info -Q onsite-london
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://confucius:secretpassword@postgres:5432/confucius"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      WORKER_ID: "onsite-london-1"
      WORKER_REGION: "onsite-london"
      WORKER_ZONE: "secure-zone-1"
      WORKER_CAPABILITIES: '{"gpu": "true", "pii_access": "true"}'
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
    networks:
      - default

networks:
  default:
    name: confucius_default
    external: true
