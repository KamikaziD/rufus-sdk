# config/compliance_review.yaml
workflow_type: "ComplianceReview"
workflow_version: "1.0"
initial_state_model: "state_models.ComplianceState"

steps:
  - name: "Fetch_Client_Data"
    type: "STANDARD"
    function: "steps.compliance.fetch_client_data"
    input_model: "state_models.ComplianceReviewFetchClientDataInput"
    dependencies: []
  - name: "Run_Compliance_Checks"
    type: "ASYNC"
    function: "steps.compliance.run_compliance_checks"
    dependencies: ["Fetch_Client_Data"]
  - name: "Generate_Compliance_Report"
    type: "STANDARD"
    function: "steps.compliance.generate_compliance_report"
    dependencies: ["Run_Compliance_Checks"]