workflow_type: "TodoProcessingWorkflow"
description: "Demonstrates HTTP steps, random selection, and human-in-the-loop."
initial_state_model: "todo_state_models.TodoProcessingState"

steps:
  # Step 1: HTTP GET to fetch todo list
  - name: "Fetch_Todos"
    type: "HTTP"
    method: "GET"
    url: "{{todo_list_url}}"
    output_key: "todo_list_response"
    includes: ["body", "status_code"]
    automate_next: true

  # Step 2: Python logic to pick one random item from the response
  - name: "Select_Random_Item"
    type: "STANDARD"
    function: "steps.todo.select_random_todo"
    automate_next: true

  # Step 3: Fake processing (could be another HTTP call)
  - name: "Process_Item"
    type: "STANDARD"
    function: "steps.todo.fake_process_item"
    automate_next: true

  # Step 4: Fire-and-forget notification
  - name: "Notify_Completion"
    type: "FIRE_AND_FORGET"
    target_workflow_type: "NotificationWorkflow"
    initial_data_template:
      message: "Todo {{state.selected_todo.id}} processed."
      recipient: "notification_{{state.selected_todo.id}}@example.com"
    automate_next: true
