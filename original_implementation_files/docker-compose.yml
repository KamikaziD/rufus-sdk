version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: confucius
      POSTGRES_USER: confucius
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confucius -d confucius"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: python:3.11-slim
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://confucius:secretpassword@postgres:5432/confucius
      WORKFLOW_STORAGE: postgres
    command: ["bash", "-lc", "pip install -r requirements.txt >/dev/null 2>&1 || true; pip install -e . >/dev/null 2>&1 || true; python scripts/init_database.py"]
    restart: "no"

  api:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      - WORKFLOW_STORAGE=postgres
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://confucius:secretpassword@postgres:5432/confucius
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ENV=development
    ports:
      - "8000:8000"
    command: ["bash", "-lc", "pip install -r requirements.txt >/dev/null 2>&1 || true; uvicorn main:app --host 0.0.0.0 --port 8000 --reload"]
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app

  celery_worker:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      - PYTHONPATH=/app/src
      - WORKFLOW_STORAGE=postgres
      - DATABASE_URL=postgresql://confucius:secretpassword@postgres:5432/confucius
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - WORKER_ID=default-worker-1
    command: ["bash", "-lc", "pip install -r requirements.txt >/dev/null 2>&1 || true; celery -A confucius.celery_app worker --loglevel=info --concurrency=2"]
    volumes:
      - ./:/app
    working_dir: /app

  celery_beat:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      - PYTHONPATH=/app/src
      - WORKFLOW_STORAGE=postgres
      - DATABASE_URL=postgresql://confucius:secretpassword@postgres:5432/confucius
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: ["bash", "-lc", "pip install -r requirements.txt >/dev/null 2>&1 || true; celery -A confucius.celery_app beat --loglevel=info"]
    volumes:
      - ./:/app
    working_dir: /app

  retry_service:
    build: ./services/retry-service
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_BASE_URL=http://api:8000
    restart: always

volumes:
  postgres_data: