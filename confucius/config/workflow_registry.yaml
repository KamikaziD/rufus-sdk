# workflow_registry.yaml

workflows:
  - type: "GearsTest"
    config_file: "config/gears_test_workflow.yaml"
    initial_state_model: "state_models.GearsTestState"
    description: "Testing new workflow primitives (Loops, Fire-and-Forget, Scheduler)"
    initial_data:
      test_id: "GEARS-TEST-001"
      items: ["Item A", "Item B", "Item C", "Item D", "Item E"]

  - type: "LoanApplication"
    description: "Multi-step process for consumer loan approval."
    config_file: "config/loan_workflow.yaml"
    initial_state_model: "state_models.LoanApplicationState"

  - type: "KYC"
    description: "Know Your Customer verification sub-workflow (used by LoanApplication)."
    config_file: "config/kyc_workflow.yaml"
    initial_state_model: "state_models.KYCState"

  - type: "CustomerOnboarding"
    description: "New customer setup and profile creation."
    config_file: "config/onboarding_workflow.yaml"
    initial_state_model: "state_models.OnboardingState"

  - type: "ComplianceReview"
    description: "Internal periodic client compliance check."
    config_file: "config/compliance_review.yaml"
    initial_state_model: "state_models.ComplianceState"

  - type: "ImageComplianceWorkflow"
    description: "Runs an AI agent to analyze marketing materials for compliance."
    config_file: "config/image_compliance_workflow.yaml"
    initial_state_model: "state_models.ImageComplianceState"

  - type: "SuperWorkflow"
    description: "A workflow to showcase the automate_next feature."
    config_file: "config/super_workflow.yaml"
    initial_state_model: "state_models.SuperWorkflowState"

  - type: "TodoProcessingWorkflow"
    description: "Demonstrates HTTP steps, random selection, and human-in-the-loop."
    config_file: "config/todo_workflow.yaml"
    initial_state_model: "todo_state_models.TodoProcessingState"

  - type: "TestScheduler"
    description: "Test workflow for scheduler verification"
    config_file: "config/test_scheduler_workflow.yaml"
    initial_state_model: "scheduled_report_models.ScheduledReportState"

  - type: "NotificationWorkflow"
    description: "Simple fire-and-forget notification."
    config_file: "config/notification_workflow.yaml"
    initial_state_model: "state_models.NotificationState"