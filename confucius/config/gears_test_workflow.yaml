workflow_type: "GearsTest"
initial_data:
      test_id: "GEARS-TEST-001"
      items: ["Item A", "Item B", "Item C", "Item D", "Item E"]
steps:
  - name: "Spawn_Background_Task"
    type: "FIRE_AND_FORGET"
    target_workflow_type: "CustomerOnboarding"
    initial_data_template:
      name: "Background_User_{{state.test_id}}"
      email: "bg_{{state.test_id}}@example.com"
    automate_next: true

  - name: "Iterate_Items"
    type: "LOOP"
    mode: "ITERATE"
    iterate_over: "state.items"
    item_var_name: "loop_item"
    loop_body:
      - name: "Process_Single_Item"
        function: "steps.gears_test.process_item"
    automate_next: true

  - name: "Schedule_Future_Run"
    type: "CRON_SCHEDULER"
    schedule: "*/5 * * * *"  # Every 5 minutes
    target_workflow_type: "CustomerOnboarding"
    schedule_name: "future_onboarding_{{workflow_id}}"
    initial_data_template:
      name: "Scheduled_User"
      email: "scheduled@example.com"
    automate_next: true

  - name: "Confirm_Schedule"
    type: "STANDARD"
    function: "workflow_utils.mark_schedule_registered"
    automate_next: true

  - name: "Final_Check"
    function: "steps.gears_test.log_spawn"
    automate_next: false
